# prj.conf — comb readout, XIAO nRF52840
# USB CDC ACM console is added via -S cdc-acm-console snippet at build time

CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_GPIO=y

CONFIG_FPU=y            # float IIR in main loop

CONFIG_LOG=y
CONFIG_PRINTK=y

# USB work queue: raise priority so it is not starved by 40 kHz k_timer.
# Default is -1 (lowest cooperative). -2 gives it more CPU headroom.
CONFIG_USB_WORKQUEUE_PRIORITY=-2

# Larger CDC ACM TX ring buffer to absorb bursts
#CONFIG_USB_CDC_ACM_RINGBUF_SIZE=1024
#CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Disable unused subsystems
CONFIG_BT=n
CONFIG_NETWORKING=n
CONFIG_SHELL=n
