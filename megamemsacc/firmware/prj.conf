# prj.conf — comb readout, XIAO nRF52840
# Uses nrfx SAADC + PPI + TIMER directly for high sample rate DMA

CONFIG_PWM=y
CONFIG_GPIO=y
CONFIG_FPU=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# nrfx drivers — bypass Zephyr ADC driver for DMA access
CONFIG_ADC=n
CONFIG_NRFX_SAADC=y
CONFIG_NRFX_TIMER1=y
CONFIG_NRFX_PPI=y

# Disable unused subsystems
CONFIG_BT=n
CONFIG_NETWORKING=n
CONFIG_SHELL=n
