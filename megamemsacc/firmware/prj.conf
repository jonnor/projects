# Zephyr project config — comb_readout
CONFIG_ADC=y
CONFIG_ADC_STM32=y
CONFIG_ADC_ASYNC=n          # polling mode required for ISR adc_read()
CONFIG_ADC_STM32_DMA=n
 
CONFIG_LOG=y
CONFIG_PRINTK=y
 
# Allow HAL calls (TIM1/TIM2 direct)
CONFIG_USE_STM32_HAL_TIM=y
CONFIG_USE_STM32_HAL_GPIO=y
CONFIG_USE_STM32_HAL_RCC=y

